<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>玩家统计</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 20px; color: #00d9ff; }
    .search { margin-bottom: 20px; }
    .search input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #16213e;
      color: #fff;
      font-size: 16px;
    }
    .search input:focus { outline: 2px solid #00d9ff; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #333;
    }
    th { background: #16213e; color: #00d9ff; }
    tr:hover { background: #16213e; }
    .time { color: #ffd700; font-weight: bold; }
    .date { color: #888; font-size: 14px; }
    .empty { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>
  <div id="app" class="container">
    <h1>🎮 玩家统计</h1>
    <div class="search">
      <input v-model="search" placeholder="搜索玩家...">
    </div>
    <table v-if="players.length">
      <thead>
        <tr>
          <th>玩家名</th>
          <th>总时间</th>
          <th>最后在线</th>
        </tr>
      </thead>
      <tbody>
        <tr v-for="p in players" :key="p.playerName">
          <td>{{ p.playerName }}</td>
          <td class="time">{{ formatTime(p.totalTime) }}</td>
          <td class="date">{{ p.lastDate }}</td>
        </tr>
      </tbody>
    </table>
    <div v-else class="empty">暂无数据</div>
  </div>

  <script>
    const { createApp, ref, computed } = Vue

    createApp({
      setup() {
        const search = ref('')
        const rawData = ref([])

        // 获取db.json数据
        fetch('db.json')
          .then(r => r.json())
          .then(data => {
            rawData.value = data.daily || []
          })

        const players = computed(() => {
          const map = new Map()
          for (const row of rawData.value) {
            const name = row.playerName
            if (!name) continue
            const existing = map.get(name)
            if (!existing || row.timestamp > existing.timestamp) {
              map.set(name, {
                playerName: name,
                totalTime: row.totalTime || 0,
                lastDate: row.date,
                timestamp: row.timestamp
              })
            }
          }
          return Array.from(map.values())
            .filter(p => p.playerName.toLowerCase().includes(search.value.toLowerCase()))
            .sort((a, b) => b.totalTime - a.totalTime)
        })

        const formatTime = (seconds) => {
          if (!seconds) return '0秒'
          const h = Math.floor(seconds / 3600)
          const m = Math.floor((seconds % 3600) / 60)
          const s = seconds % 60
          if (h > 0) return `${h}小时${m}分${s}秒`
          if (m > 0) return `${m}分${s}秒`
          return `${s}秒`
        }

        return { search, players, formatTime }
      }
    }).mount('#app')
  </script>
</body>
</html>
